name: release-plz

permissions:
  pull-requests: write
  contents: write
  id-token: write # crates.io trusted publishing

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - release-plz

concurrency:
  group: release-plz

env:
  DRY_RUN: 0

jobs:
  release-plz:
    runs-on: ubuntu-latest
    steps:
      # release-plz pushes tags and the release branch via `git push`, which needs the scoped
      # FNOX_GH_TOKEN persisted in the git config.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked]
        with:
          fetch-depth: 0
          token: ${{ secrets.FNOX_GH_TOKEN }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true
          cache: false
      - run: mise trust --all
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: crates-io-auth
      - run: mise run release-plz
        env:
          GITHUB_TOKEN: ${{ secrets.FNOX_GH_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
